; ╔══════════════════════════════════════════════════════════╗
; ║          picam-frontend  –  configuration file             ║
; ╚══════════════════════════════════════════════════════════╝
;
; Lists every picam-orchestrator backend (one per Pi) this frontend can show.
; Each entry: <name> = <host>[:<port>][,<Display Label>]
;   name   — short identifier, used internally and in URLs (?pi=name)
;   host   — IP or hostname of the Pi running picam-orchestrator
;   port   — defaults to 81 if omitted (picam-orchestrator's default port)
;   label  — optional display name shown in the UI; defaults to the name

[pis]
front = 10.10.0.50,Front Yard
back  = 10.10.0.51,Back Yard
; add more Pis here, one per line:
; side = 10.10.0.52:81,Side Gate

[output]
http_port = 80                     ; open http://<this-host> in a browser
web_dir   = /usr/share/picam-frontend/web

; ── WebRTC relay ────────────────────────────────────────────
; This process runs two ICE port ranges: one for its upstream
; connections to each picam-orchestrator (LAN-only), and one for its
; downstream connections to browsers (potentially reachable from
; outside the LAN, e.g. if this host is port-forwarded).
[webrtc]
ice_port_min = 50000
ice_port_max = 50200
; No STUN/TURN by default. The upstream (Pi-facing) leg never needs
; one — it's LAN-only. The downstream (browser-facing) leg might, if
; this frontend is ever reachable from outside the LAN; uncomment if so.
; stun_server = stun:stun.l.google.com:19302
